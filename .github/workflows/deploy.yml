name: Deploy to GitHub Pages

# Build the PWA and publish dist/ to GitHub Pages on every push to main.
on:
  push:
    # Deploy from main and from the current default branch. The github-pages
    # environment only permits the repo's DEFAULT branch, so we include it here
    # so pushes deploy without tripping the environment protection rule.
    branches: [main, "claude/relaxed-gates-a8t0v3"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
